name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Capturer coverage
        run: |
          set -o pipefail
          bun test --coverage 2>&1 | tee /tmp/coverage.txt

      - name: Générer badge coverage
        if: github.ref == 'refs/heads/master'
        run: |
          # Afficher la sortie brute pour debug
          echo "=== coverage.txt ==="
          cat /tmp/coverage.txt
          echo "===================="

          # Strip ANSI + extraire % statements de la ligne "All files"
          RAW=$(sed 's/\x1b\[[0-9;]*[mGKHF]//g' /tmp/coverage.txt \
                | grep -E "All files" \
                | grep -oE "[0-9]+(\.[0-9]+)?" \
                | head -1)
          PCT=${RAW:-0}
          PCT_INT=$(printf "%.0f" "$PCT")
          echo "DEBUG: RAW=${RAW} PCT=${PCT} PCT_INT=${PCT_INT}"

          if [ "$PCT_INT" -ge 80 ]; then COLOR="#4c1"
          elif [ "$PCT_INT" -ge 60 ]; then COLOR="#dfb317"
          else COLOR="#e05d44"
          fi

          LABEL="coverage"
          VALUE="${PCT_INT}%"

          LW=63
          RW=40
          TW=$((LW + RW))
          LX=$((LW / 2))
          RX=$((LW + RW / 2))

          cat > /tmp/coverage.svg << SVGEOF
          <svg xmlns="http://www.w3.org/2000/svg" width="${TW}" height="20">
            <linearGradient id="s" x2="0" y2="100%">
              <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
              <stop offset="1" stop-opacity=".1"/>
            </linearGradient>
            <rect rx="3" width="${TW}" height="20" fill="#555"/>
            <rect rx="3" x="${LW}" width="${RW}" height="20" fill="${COLOR}"/>
            <rect rx="3" width="${TW}" height="20" fill="url(#s)"/>
            <g fill="#fff" text-anchor="middle" font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-size="11">
              <text x="${LX}" y="15" fill="#010101" fill-opacity=".3">${LABEL}</text>
              <text x="${LX}" y="14">${LABEL}</text>
              <text x="${RX}" y="15" fill="#010101" fill-opacity=".3">${VALUE}</text>
              <text x="${RX}" y="14">${VALUE}</text>
            </g>
          </svg>
          SVGEOF

      - name: Publier badge sur gh-pages
        if: github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages 2>/dev/null || true
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          git rm -rf . --quiet 2>/dev/null || true
          cp /tmp/coverage.svg coverage.svg
          git add coverage.svg
          git diff --staged --quiet || git commit -m "chore: update coverage badge"
          git push origin gh-pages --force
          git checkout master
